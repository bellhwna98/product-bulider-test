<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-8860670766512405">
  <title>제휴 문의</title>
  <link href='/style.css' rel='stylesheet'>
  <link href='/contact.css' rel='stylesheet'>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8860670766512405"
     crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <button id="themeToggle" onclick="toggleTheme()" aria-label="테마 전환">🌙</button>
    <h1>📩 제휴 문의</h1>
    <p class="subtitle">제휴 및 협업 관련 문의를 남겨주세요.</p>

    <form id="contactForm" action="https://formspree.io/f/mlgwndek" method="POST">
      <div class="form-group">
        <label for="company">회사/단체명</label>
        <input type="text" id="company" name="company" placeholder="회사명을 입력하세요" required>
      </div>
      <div class="form-group">
        <label for="name">담당자명</label>
        <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
      </div>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label for="phone">연락처</label>
        <input type="tel" id="phone" name="phone" placeholder="010-0000-0000">
      </div>
      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="5" placeholder="제휴 관련 내용을 작성해주세요." required></textarea>
      </div>
      <button type="submit" id="submitBtn">문의 보내기</button>
    </form>

    <a href="/index.html" class="back-link">← 메인으로 돌아가기</a>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
